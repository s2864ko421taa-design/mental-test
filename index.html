<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CORE CODE</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>CORE CODE</h1>
    <p class="subtitle">
      性格ではなく、思考構造を解析する。
    </p>
    <div class="card">
      <h2 id="question">
        質問がここに表示されます
      </h2>
      <div id="answers"></div>
      <div class="progress">
        <div id="bar"></div>
      </div>
      <p id="count"></p>
    </div>
    <div id="result" class="hidden">
      <h2 id="resultCode"></h2>
      <h1 id="resultName"></h1>
      <p id="resultText"></p>
      <button onclick="location.reload()">
        もう一度診断する
      </button>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
